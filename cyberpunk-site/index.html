<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyberpunk City</title>
    <link rel="stylesheet" href="styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 class="cyberpunk-text">CYBERPUNK CITY</h1>
        <p class="neon-blue">Neon. Rain. Chrome. Future is now.</p>
    </header>

    <section class="hero">
        <img src="images/istockphoto-1893281874-612x612.jpg" alt="Cyberpunk City">
    </section>

    <section class="content">
        <h2 class="cyber-font">Welcome to the Neon District</h2>
        <p>
            The city never sleeps. Neon lights cut through the rain.  
            Corporations rule the skyline. Hackers rule the underground.
        </p>

        <img src="images/istockphoto-1405987908-2048x2048.jpg" class="small-img" alt="Cyberpunk Art">
    </section>

    <footer>
        <p>Cyberpunk Demo Project · 2026</p>
    </footer>
</body>
</html>
